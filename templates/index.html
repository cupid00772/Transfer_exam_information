<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實時轉學考資訊系統</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
        }

        /* 搜尋區塊與卡片 */
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .search-bar {
            display: flex;
            max-width: 600px;
            margin: 0 auto 2rem auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .search-bar input {
            flex: 1;
            padding: 1rem;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .search-bar button {
            padding: 1rem 2rem;
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .search-bar button:hover {
            background-color: var(--primary-hover);
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin: 0 0 0.5rem 0;
            color: var(--primary);
            font-size: 1.25rem;
        }

        .card .badge {
            display: inline-block;
            background: #DBEAFE;
            color: #1E40AF;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .card p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .card .important {
            color: #B91C1C;
            font-weight: bold;
        }

        .card a {
            display: inline-block;
            margin-top: 1rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .card a:hover {
            text-decoration: underline;
        }

        /* 聊天區塊 */
        .chat-sidebar {
            width: 400px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 15px rgba(0,0,0,0.05);
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--primary);
            color: white;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .msg.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
        }

        .msg.assistant {
            align-self: flex-start;
            background: #F3F4F6;
            color: var(--text);
            border-bottom-left-radius: 0;
        }

        .chat-input {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        .chat-input button {
            padding: 0.75rem 1.25rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 1rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header">
            <h1>實時轉學考資訊系統</h1>
            <p>快速查詢各大專院校轉學考簡章、報名時程與資格限制</p>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="輸入學校或科系名稱，例如：台大 或 資訊工程..." onkeypress="handleSearchKeyPress(event)">
            <button onclick="searchExams()">搜尋資訊</button>
        </div>

        <div id="resultsLoader" class="loader">正在取得最新資訊...</div>
        
        <div class="results-container" id="resultsContainer">
            <!-- 卡片會由 JS 動態生成 -->
        </div>
    </div>

    <div class="chat-sidebar">
        <div class="chat-header">
            <h2>AI 轉學考顧問</h2>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg assistant">你好！我是你的轉學考專屬 AI 顧問。你可以問我關於目前系統內有收錄的轉學考時程或資格限制喔！</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="問問 AI 關於轉學考的問題..." onkeypress="handleChatKeyPress(event)">
            <button onclick="sendMessage()">發送</button>
        </div>
    </div>

    <script>
        // 產生簡單的 session token 用於測試
        let sessionToken = localStorage.getItem('sessionToken');
        if (!sessionToken) {
            sessionToken = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sessionToken', sessionToken);
        }

        // 初始化：載入全部資料
        searchExams();

        function handleSearchKeyPress(e) {
            if (e.key === 'Enter') searchExams();
        }

        function handleChatKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function searchExams() {
            const keyword = document.getElementById('searchInput').value;
            const container = document.getElementById('resultsContainer');
            const loader = document.getElementById('resultsLoader');
            
            container.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`);
                const result = await response.json();
                
                loader.style.display = 'none';

                if (result.status === 'success' && result.data.length > 0) {
                    result.data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <h3>${item.school_name}</h3>
                            <div class="badge">${item.year}${item.semester}</div>
                            <p><strong>報名期間:</strong> <span class="important">${item.apply_period}</span></p>
                            <p><strong>考試日期:</strong> ${item.exam_date}</p>
                            <p><strong>招生名額:</strong> ${item.quota} 名 (含各系總和)</p>
                            <p><strong>報名限制:</strong> ${item.restrictions}</p>
                            <a href="${item.brochure_url}" target="_blank">📄 下載官方簡章</a>
                            <p style="font-size: 0.75rem; margin-top: 1rem;">最後更新: ${item.updated_at}</p>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #6B7280;">找不到相關轉學考資訊。</p>';
                }
            } catch (error) {
                loader.style.display = 'none';
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red;">發生錯誤，無法取得資訊。</p>';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            // 清空輸入框
            input.value = '';

            const msgContainer = document.getElementById('chatMessages');
            
            // 顯示使用者訊息
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = message;
            msgContainer.appendChild(userDiv);
            msgContainer.scrollTop = msgContainer.scrollHeight;

            // 顯示 AI 思考中
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg assistant';
            aiDiv.innerText = '思考中...';
            msgContainer.appendChild(aiDiv);
            msgContainer.scrollTop = msgContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_token: sessionToken,
                        message: message
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    aiDiv.innerText = result.reply;
                } else {
                    aiDiv.innerText = '發生錯誤：' + result.reply;
                    aiDiv.style.color = 'red';
                }
            } catch (error) {
                aiDiv.innerText = '網路連線錯誤，無法與 AI 通訊。';
                aiDiv.style.color = 'red';
            }
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }
    </script>
</body>
</html>
